- hosts: all
  gather_facts: true
  become: true


  tasks:
    # Install prerequisites for Docker
    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - python3-venv
        state: latest
        update_cache: yes


    # Add Docker’s official GPG key
    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/debian/gpg
        state: present


    # Set up the Docker stable repository
    - name: Add Docker APT repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/debian {{ ansible_facts['distribution_release'] }} stable"
        state: present
        update_cache: yes


    # Install Docker
    - name: Install Docker
      apt:
        name: docker-ce
        state: present


    # Install Python3 and pip3
    - name: Install Python3 and pip3
      apt:
        name:
          - python3
          - python3-pip
        state: present


    # Create a virtual environment for Python packages
    - name: Create a virtual environment for Docker SDK
      command: python3 -m venv /opt/docker_venv
      args:
        creates: /opt/docker_venv  # Only runs if this directory doesn’t exist


    # Install Docker SDK for Python in the virtual environment
    - name: Install Docker SDK for Python in virtual environment
      command: /opt/docker_venv/bin/pip install docker


    # Ensure Docker is running
    - name: Make sure Docker is running
      service:
        name: docker
        state: started
      tags: docker

    # Create Docker network
    - name: Create app-network
      docker_network:
        name: app-network
        driver: bridge
        state: present

    - name: Run Database
      docker_container:
        name: app
        image: kaidokof/tp-devops-simple-api-database
        state: started
        networks:
          - name: app-network
        

    - name: Run Backend
      docker_container:
        name: simpleapi
        image: kaidokof/tp-devops-simple-api-backend
        state: started
        networks:
          - name: app-network
        published_ports:
          - "8080:8080"

    - name: Run HTTPD
      docker_container:
        name: httpd
        image: kaidokof/tp-devops-simple-api-httpd
        state: started
        networks:
          - name: app-network
        ports:
          - "80:80"
          
